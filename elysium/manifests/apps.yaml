apps:
  - id: dfr
    name: DFR
    description: Diagnostic file review and repair tool
    icon_url: https://raw.githubusercontent.com/Protechas/DFR/main/DFR.ico
    repo_url: https://github.com/Protechas/DFR.git
    repo_name: DFR
    launch:
      type: python
      entry: DFR.py
    environment:
      type: python
      requirements: requirements.txt
    tags:
      - diagnostics
      - repair

